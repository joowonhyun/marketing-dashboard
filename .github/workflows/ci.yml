name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dashboard
          POSTGRES_PASSWORD: dashboard
          POSTGRES_DB: marketing_dashboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://dashboard:dashboard@localhost:5432/marketing_dashboard?schema=public
      JWT_SECRET: ci-test-secret
      JWT_REFRESH_SECRET: ci-test-refresh-secret
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ci-test-admin-pw
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: server/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate
      - run: pnpm test
      - run: pnpm run test:e2e
      - run: npx tsc --noEmit
      - run: npx eslint "{src,apps,libs,test}/**/*.ts"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: npx tsc --noEmit
      - run: pnpm run build
